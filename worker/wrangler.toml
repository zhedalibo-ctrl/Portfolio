name = "portfolio-publish"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# 环境变量（本地用 .dev.vars，生产用 wrangler secret put）
# 复制 .dev.vars.example 为 .dev.vars 并填入本地测试值
[vars]
# 生产环境固定为 github（本地开发用 scripts/local-server.mjs，不依赖此值）
# 本地模式的 CONTENT_DIR 仅 local-server.mjs 使用，不在此配置

# 以下敏感变量用 secret 管理，勿提交：
# API_KEY    —— 调用接口的鉴权密钥
# GH_TOKEN   —— GitHub 细粒度 PAT（生产模式用）
# GH_REPO    —— 如 owner/repo（生产模式用）
# GH_BRANCH  —— 草稿分支，如 content/draft（生产模式用）
